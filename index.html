    <!-- Hero Section -->

            <p class="text-gray-500 text-base md:text-lg leading-relaxed max-w-xl mx-auto">

            </p>

    </header>

    <!-- Main Content -->
    <main class="max-w-3xl mx-auto px-4 pb-24">
        
        <!-- Tabs -->

            <p class="text-gray-400 text-sm">

                © 2024 Sister Ximen Beauty & Spa. 內部教育訓練專用。
            </p>
        </div>
    </footer>

    <!-- JavaScript 邏輯與資料 -->

              '熱敷與照燈：蓋上已預熱的熱肩墊 (上半身蓋毛巾，客人手放裡面防冷)。打開黑科技燈照射「腰部腎區」(溫暖有好處)。因肩膀已有熱墊繼續加熱，肩膀不需照燈。',

        const faceCourses = [

          {
            id: 'f2', title: '小綠人 (奇肌養顏)', duration: '60分',

              '深層清潔：鏟皮儀全臉去除表面髒污。',
              '導入：導入精華液 10 分鐘 (儀器強度 10)。',
              '敷膜：依序放上化妝棉片 ➔ 紗布 ➔ 調和綠色面膜 (使用 1.5 包，包含頸部，嘴巴可不用)，共敷 10 分鐘。',

            ]
          },
          {
            id: 'f4', title: '粉刺修護', duration: '90分',
            steps: ['流程：卸妝洗臉 ➔ 去角質 ➔ 臉部舒導 ➔ 清粉刺 ➔ 超聲波導入 ➔ 螺旋藻敷臉 ➔ 頭肩舒緩按摩。']

        // --- 渲染邏輯 ---
        function renderList(tab) {
            const data = tab === 'body' ? bodyCourses : faceCourses;
            const container = document.getElementById('course-list');
            
            // 更新標題
            document.getElementById('section-title').innerText = tab === 'body' 
                ? '身體舒壓 SOP (共11項)' 
                : '皮膚管理 SOP (共9項)';

            // 產生 HTML
            container.innerHTML = data.map(item => `
                <div class="mb-4 bg-white rounded-2xl shadow-sm border border-rose-100 overflow-hidden transition-all duration-300">
                    <button class="accordion-btn w-full px-6 py-5 flex items-center justify-between bg-white hover:bg-rose-50/50 transition-colors" data-id="${item.id}">
                        <div class="flex items-center gap-4">
                            <div class="bg-rose-100 p-2 rounded-full text-rose-600">
                                <i data-lucide="sparkles" class="w-5 h-5"></i>
                            </div>
                            <div class="text-left">
                                <h3 class="text-lg font-bold text-gray-800">${item.title}</h3>
                                <div class="flex items-center text-rose-500 text-sm mt-1 font-medium">
                                    <i data-lucide="clock" class="w-3.5 h-3.5 mr-1"></i>
                                    ${item.duration}
                                </div>
                            </div>
                        </div>
                        <div class="icon-container transform transition-transform duration-300 text-rose-300" id="icon-${item.id}">
                            <i data-lucide="chevron-down" class="w-6 h-6"></i>
                        </div>
                    </button>

                    <div class="accordion-content transition-all duration-500 ease-in-out max-h-0 opacity-0 overflow-hidden" id="content-${item.id}">
                        <div class="p-6 pt-0 border-t border-rose-50 bg-rose-50/30">
                            <ul class="space-y-3 mt-4">
                                ${item.steps.map(step => {
                                    const isWarning = step.includes('‼️') || step.includes('注意');
                                    const formattedStep = step.replace(/‼️/g, '').replace(/📍/g, '📌');
                                    return `
                                        <li class="flex items-start gap-3 p-3 rounded-lg text-sm md:text-base leading-relaxed ${isWarning ? 'bg-red-50 text-red-800 border border-red-100' : 'text-gray-700'}">
                                            ${isWarning 
                                                ? `<i data-lucide="alert-circle" class="w-5 h-5 text-red-500 flex-shrink-0 mt-0.5"></i>`
                                                : `<div class="w-1.5 h-1.5 rounded-full bg-rose-400 mt-2 flex-shrink-0"></div>`
                                            }
                                            <span>${formattedStep}</span>
                                        </li>
                                    `;
                                }).join('')}
                            </ul>
                        </div>
                    </div>
                </div>
            `).join('');

            // 重新初始化圖標
            lucide.createIcons();

            // 綁定手風琴展開/收合事件
            document.querySelectorAll('.accordion-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const id = this.getAttribute('data-id');
                    const content = document.getElementById(`content-${id}`);
                    const icon = document.getElementById(`icon-${id}`);
                    const isOpen = content.classList.contains('max-h-[1000px]');

                    // 先收合所有項目
                    document.querySelectorAll('.accordion-content').forEach(c => {
                        c.classList.remove('max-h-[1000px]', 'opacity-100');
                        c.classList.add('max-h-0', 'opacity-0');
                    });
                    document.querySelectorAll('.icon-container').forEach(i => {
                        i.classList.remove('rotate-180');
                    });

                    // 如果原本是收合的，則展開點擊的項目
                    if (!isOpen) {
                        content.classList.remove('max-h-0', 'opacity-0');
                        content.classList.add('max-h-[1000px]', 'opacity-100');
                        icon.classList.add('rotate-180');
                    }
                });
            });
        }

        // --- 頁籤切換事件 ---
        const btnBody = document.getElementById('tab-body');
        const btnFace = document.getElementById('tab-face');

        btnBody.addEventListener('click', () => {
            btnBody.className = "tab-btn flex-1 flex items-center justify-center gap-2 py-3.5 px-4 rounded-xl font-bold text-sm md:text-base transition-all bg-white text-rose-600 shadow-md";
            btnFace.className = "tab-btn flex-1 flex items-center justify-center gap-2 py-3.5 px-4 rounded-xl font-bold text-sm md:text-base transition-all text-gray-500 hover:text-gray-700";
            renderList('body');
        });

        btnFace.addEventListener('click', () => {
            btnFace.className = "tab-btn flex-1 flex items-center justify-center gap-2 py-3.5 px-4 rounded-xl font-bold text-sm md:text-base transition-all bg-white text-rose-600 shadow-md";
            btnBody.className = "tab-btn flex-1 flex items-center justify-center gap-2 py-3.5 px-4 rounded-xl font-bold text-sm md:text-base transition-all text-gray-500 hover:text-gray-700";
            renderList('face');
        });

        // 初始載入渲染身體課程、載入Icon
        renderList('body');
        lucide.createIcons();

    </script>
</body>
</html>
